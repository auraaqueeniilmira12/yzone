<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - YZONE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000000; font-family: 'Inter', sans-serif; color: #e0e0e0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
        
        .admin-navbar {
            background: #000;
            border-bottom: 1px solid #1a1a1a;
            padding: 16px 0;
        }
        .admin-navbar .container { display: flex; justify-content: space-between; align-items: center; }
        .admin-navbar .brand a { font-size: 24px; font-weight: 800; color: #e50914; text-decoration: none; }
        .admin-navbar .nav-links a { color: #e0e0e0; text-decoration: none; margin-left: 24px; }
        .admin-navbar .nav-links a:hover { color: #e50914; }
        
        .admin-header {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 100%);
            padding: 40px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        .admin-header h1 { font-size: 36px; color: white; }
        .admin-header h1 i { color: #e50914; margin-right: 12px; }
        .admin-header p { color: #888; margin-top: 8px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 40px 0;
        }
        .stat-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
        }
        .stat-card i { font-size: 40px; color: #e50914; margin-bottom: 15px; }
        .stat-number { font-size: 36px; font-weight: 800; color: white; }
        .stat-label { font-size: 14px; color: #888; margin-top: 8px; }
        
        .admin-tabs {
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #1a1a1a;
            margin-bottom: 30px;
        }
        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .tab-btn:hover { color: #e50914; }
        .tab-btn.active { color: #e50914; border-bottom: 2px solid #e50914; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .btn-add {
            background: #e50914;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .search-box { margin-bottom: 20px; }
        .search-box input {
            width: 300px;
            padding: 10px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
        }
        .data-table { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #1a1a1a; }
        th { color: #e50914; }
        .movie-poster-preview { width: 40px; height: 60px; object-fit: cover; border-radius: 4px; }
        .btn-edit, .btn-delete {
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            border: none;
            margin-right: 5px;
        }
        .btn-edit { background: #ffc107; color: #000; }
        .btn-delete { background: #dc3545; color: white; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content h3 { margin-bottom: 20px; color: white; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            margin-bottom: 15px;
            font-family: inherit;
        }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-modal-save { background: #e50914; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-modal-cancel { background: #1a1a1a; color: #ccc; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        
        .access-denied { text-align: center; padding: 100px 20px; }
        .footer {
            background: #050505;
            padding: 40px 0 24px;
            margin-top: 60px;
            border-top: 1px solid #1a1a1a;
        }
        .footer .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .search-box input { width: 100%; }
            .admin-navbar .container { flex-direction: column; gap: 10px; }
            .nav-links a { margin: 0 10px !important; }
        }
    </style>
</head>
<body>

    <div class="admin-navbar">
        <div class="container">
            <div class="brand"><a href="/frontend/index.html">YZONE</a></div>
            <div class="nav-links">
                <a href="/frontend/index.html">Home</a>
                <a href="/frontend/pages/movies.html">Movies</a>
                <a href="/frontend/pages/actors.html">Actors</a>
                <a href="/frontend/pages/profile.html">Watchlist</a>
                <a href="/frontend/pages/login.html" id="login-link">Login</a>
                <a href="#" id="logout-link" style="display:none;">Logout</a>
            </div>
        </div>
    </div>

    <div class="admin-header">
        <div class="container">
            <h1><i class="fas fa-crown"></i> Admin Dashboard</h1>
            <p>Kelola film, user, dan review dari sini</p>
        </div>
    </div>

    <div class="container" id="admin-container"></div>

    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Tambah Film Baru</h3>
            <input type="hidden" id="edit-movie-id">
            <input type="text" id="movie-title" placeholder="Judul Film">
            <input type="number" id="movie-year" placeholder="Tahun">
            <input type="text" id="movie-genre" placeholder="Genre">
            <input type="text" id="movie-director" placeholder="Sutradara">
            <input type="number" id="movie-rating" step="0.1" placeholder="Rating (0-10)">
            <input type="url" id="movie-poster" placeholder="URL Poster">
            <textarea id="movie-description" rows="3" placeholder="Deskripsi"></textarea>
            <div class="modal-buttons">
                <button class="btn-modal-save" onclick="saveMovie()">Simpan</button>
                <button class="btn-modal-cancel" onclick="closeModal()">Batal</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-brand"><h3>YZONE</h3><p>Your Zone for Cinema</p></div>
            <div class="footer-copyright"><p>&copy; 2025 YZONE. All rights reserved.</p></div>
        </div>
    </footer>

    <script>
        // ========== DATA STORAGE ==========
        const MOVIES_KEY = 'yzone_movies_data';
        const USERS_KEY = 'yzone_users';
        const REVIEWS_KEY = 'yzone_reviews';
        const CURRENT_USER_KEY = 'yzone_current_user';
        
        // Data film default
        const DEFAULT_MOVIES = [
            { id: 1, title: "The Shawshank Redemption", year: 1994, genre: "Drama", director: "Frank Darabont", rating: 9.3, poster: "https://image.tmdb.org/t/p/w500/q6y0Go1tsGEsmtFryDOJo3dEmqu.jpg", description: "Two imprisoned men bond over a number of years, finding solace and eventual redemption through acts of common decency." },
            { id: 2, title: "The Godfather", year: 1972, genre: "Crime, Drama", director: "Francis Ford Coppola", rating: 9.2, poster: "https://image.tmdb.org/t/p/w500/3bhkrj58Vtu7enYsRolD1fZdja1.jpg", description: "The aging patriarch of an organized crime dynasty transfers control of his clandestine empire to his reluctant son." },
            { id: 3, title: "The Dark Knight", year: 2008, genre: "Action, Crime, Drama", director: "Christopher Nolan", rating: 9.0, poster: "https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg", description: "When the menace known as the Joker wreaks havoc and chaos on the people of Gotham, Batman must accept one of the greatest psychological and physical tests of his ability to fight injustice." },
            { id: 4, title: "Pulp Fiction", year: 1994, genre: "Crime, Drama", director: "Quentin Tarantino", rating: 8.9, poster: "https://image.tmdb.org/t/p/w500/d5iIlFn5s0ImszYzBPb8JPIfbXD.jpg", description: "The lives of two mob hitmen, a boxer, a gangster and his wife intertwine in four tales of violence and redemption." },
            { id: 5, title: "Forrest Gump", year: 1994, genre: "Drama, Romance", director: "Robert Zemeckis", rating: 8.8, poster: "https://image.tmdb.org/t/p/w500/saHP97rTPS5eLmrLQEcANmKrsFl.jpg", description: "The presidencies of Kennedy and Johnson, the Vietnam War, the Watergate scandal and other historical events unfold from the perspective of an Alabama man with an IQ of 75." },
            { id: 6, title: "Inception", year: 2010, genre: "Action, Sci-Fi, Thriller", director: "Christopher Nolan", rating: 8.8, poster: "https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg", description: "A thief who steals corporate secrets through the use of dream-sharing technology is given the inverse task of planting an idea into the mind of a C.E.O., but his tragic past may doom the project and his team." },
            { id: 7, title: "The Matrix", year: 1999, genre: "Action, Sci-Fi", director: "Lana Wachowski, Lilly Wachowski", rating: 8.7, poster: "https://image.tmdb.org/t/p/w500/f89U3ADr1oiB1s9GkdPOEpXUk5H.jpg", description: "A computer hacker learns from mysterious rebels about the true nature of his reality and his role in the war against its controllers." },
            { id: 8, title: "Interstellar", year: 2014, genre: "Adventure, Drama, Sci-Fi", director: "Christopher Nolan", rating: 8.6, poster: "https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg", description: "A team of explorers travel through a wormhole in space in an attempt to ensure humanity's survival." }
        ];
        
        // Inisialisasi data
        let allMovies = [];
        let allUsers = [];
        let allReviews = [];
        let currentUser = null;
        let editingMovieId = null;
        
        function initData() {
            // Load movies
            const savedMovies = localStorage.getItem(MOVIES_KEY);
            if (savedMovies) {
                allMovies = JSON.parse(savedMovies);
            } else {
                allMovies = [...DEFAULT_MOVIES];
                localStorage.setItem(MOVIES_KEY, JSON.stringify(allMovies));
            }
            
            // Load users
            const savedUsers = localStorage.getItem(USERS_KEY);
            if (savedUsers) {
                allUsers = JSON.parse(savedUsers);
            } else {
                allUsers = [{
                    id: 1,
                    name: 'Admin YZONE',
                    email: 'admin@yzone.com',
                    password: 'admin123',
                    role: 'admin',
                    createdAt: new Date().toISOString()
                }];
                localStorage.setItem(USERS_KEY, JSON.stringify(allUsers));
            }
            
            // Load reviews
            const savedReviews = localStorage.getItem(REVIEWS_KEY);
            if (savedReviews) {
                allReviews = JSON.parse(savedReviews);
            } else {
                allReviews = [];
                localStorage.setItem(REVIEWS_KEY, JSON.stringify(allReviews));
            }
            
            // Check current user
            const savedCurrentUser = localStorage.getItem(CURRENT_USER_KEY);
            if (savedCurrentUser) {
                currentUser = JSON.parse(savedCurrentUser);
            }
        }
        
        function saveMoviesToStorage() {
            localStorage.setItem(MOVIES_KEY, JSON.stringify(allMovies));
            // Trigger storage event agar halaman lain bisa update
            window.dispatchEvent(new StorageEvent('storage', {
                key: MOVIES_KEY,
                newValue: JSON.stringify(allMovies)
            }));
        }
        
        // Cek login admin
        function checkAdminAccess() {
            const loginLink = document.getElementById('login-link');
            const logoutLink = document.getElementById('logout-link');
            
            if (currentUser && currentUser.role === 'admin') {
                if (loginLink) loginLink.style.display = 'none';
                if (logoutLink) {
                    logoutLink.style.display = 'inline';
                    logoutLink.onclick = (e) => {
                        e.preventDefault();
                        localStorage.removeItem(CURRENT_USER_KEY);
                        window.location.href = '/frontend/pages/login.html';
                    };
                }
                return true;
            } else {
                document.getElementById('admin-container').innerHTML = `
                    <div class="access-denied">
                        <i class="fas fa-ban"></i>
                        <h2>Akses Ditolak</h2>
                        <p>Halaman ini hanya untuk administrator.</p>
                        <a href="/frontend/pages/login.html" style="display: inline-block; margin-top: 20px; padding: 12px 24px; background: #e50914; color: white; text-decoration: none; border-radius: 8px;">Login sebagai Admin</a>
                    </div>
                `;
                return false;
            }
        }
        
        // Render dashboard
        function renderDashboard() {
            const totalMovies = allMovies.length;
            const totalUsers = allUsers.length;
            const totalReviews = allReviews.length;
            const avgRating = totalMovies > 0 ? (allMovies.reduce((s,m)=>s+m.rating,0)/totalMovies).toFixed(1) : 0;
            
            const html = `
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-film"></i><div class="stat-number">${totalMovies}</div><div class="stat-label">Total Film</div></div>
                    <div class="stat-card"><i class="fas fa-users"></i><div class="stat-number">${totalUsers}</div><div class="stat-label">Total User</div></div>
                    <div class="stat-card"><i class="fas fa-comments"></i><div class="stat-number">${totalReviews}</div><div class="stat-label">Total Review</div></div>
                    <div class="stat-card"><i class="fas fa-star"></i><div class="stat-number">${avgRating}</div><div class="stat-label">Rata-rata Rating</div></div>
                </div>
                <div class="admin-tabs">
                    <button class="tab-btn active" onclick="showTab('movies')"><i class="fas fa-film"></i> Film</button>
                    <button class="tab-btn" onclick="showTab('users')"><i class="fas fa-users"></i> User</button>
                    <button class="tab-btn" onclick="showTab('reviews')"><i class="fas fa-comments"></i> Review</button>
                </div>
                <div id="tab-movies" class="tab-content active">
                    <button class="btn-add" onclick="openAddMovieModal()"><i class="fas fa-plus"></i> Tambah Film Baru</button>
                    <div class="search-box"><input type="text" id="searchMovies" placeholder="Cari film..." onkeyup="renderMoviesTable()"></div>
                    <div class="data-table"><table><thead><tr><th>ID</th><th>Poster</th><th>Judul</th><th>Tahun</th><th>Genre</th><th>Rating</th><th>Aksi</th></tr></thead><tbody id="moviesTableBody"></tbody></table></div>
                </div>
                <div id="tab-users" class="tab-content">
                    <div class="search-box"><input type="text" id="searchUsers" placeholder="Cari user..." onkeyup="renderUsersTable()"></div>
                    <div class="data-table"><table><thead><tr><th>ID</th><th>Nama</th><th>Email</th><th>Role</th><th>Aksi</th></tr></thead><tbody id="usersTableBody"></tbody></table></div>
                </div>
                <div id="tab-reviews" class="tab-content">
                    <div class="search-box"><input type="text" id="searchReviews" placeholder="Cari review..." onkeyup="renderReviewsTable()"></div>
                    <div class="data-table"><table><thead><tr><th>Film</th><th>User</th><th>Review</th><th>Aksi</th></tr></thead><tbody id="reviewsTableBody"></tbody></table></div>
                </div>
            `;
            
            document.getElementById('admin-container').innerHTML = html;
            
            renderMoviesTable();
            renderUsersTable();
            renderReviewsTable();
        }
        
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.target.classList.add('active');
        }
        
        function renderMoviesTable() {
            const search = document.getElementById('searchMovies')?.value.toLowerCase() || '';
            let filtered = allMovies.filter(m => m.title.toLowerCase().includes(search));
            const tbody = document.getElementById('moviesTableBody');
            if (!tbody) return;
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">Tidak ada data</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map(m => `
                <tr>
                    <td>${m.id}</td>
                    <td><img src="${m.poster}" class="movie-poster-preview" onerror="this.src='https://via.placeholder.com/40x60?text=No+Image'"></td>
                    <td>${m.title}</td>
                    <td>${m.year}</td>
                    <td>${m.genre}</td>
                    <td>${m.rating}</td>
                    <td><button class="btn-edit" onclick="openEditMovieModal(${m.id})"><i class="fas fa-edit"></i> Edit</button> <button class="btn-delete" onclick="deleteMovie(${m.id})"><i class="fas fa-trash"></i> Hapus</button></td>
                </tr>
            `).join('');
        }
        
        function renderUsersTable() {
            const search = document.getElementById('searchUsers')?.value.toLowerCase() || '';
            let filtered = allUsers.filter(u => u.name.toLowerCase().includes(search) || u.email.toLowerCase().includes(search));
            const tbody = document.getElementById('usersTableBody');
            if (!tbody) return;
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">Tidak ada data</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.name}</td>
                    <td>${u.email}</td>
                    <td style="color:${u.role==='admin'?'#e50914':'#888'}">${u.role}</td>
                    <td>${u.role !== 'admin' ? `<button class="btn-delete" onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i> Hapus</button>` : '-'}</td>
                </tr>
            `).join('');
        }
        
        function renderReviewsTable() {
            const search = document.getElementById('searchReviews')?.value.toLowerCase() || '';
            let filtered = allReviews.filter(r => r.content.toLowerCase().includes(search) || r.userName.toLowerCase().includes(search));
            const tbody = document.getElementById('reviewsTableBody');
            if (!tbody) return;
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">Tidak ada data</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map(r => {
                const movie = allMovies.find(m => m.id === r.movieId);
                return `<tr>
                    <td>${movie ? movie.title : '-'}</td>
                    <td>${r.userName}</td>
                    <td style="max-width:300px">${r.content.substring(0,100)}${r.content.length>100?'...':''}</td>
                    <td><button class="btn-delete" onclick="deleteReview(${r.id})"><i class="fas fa-trash"></i> Hapus</button></td>
                </tr>`;
            }).join('');
        }
        
        window.showTab = showTab;
        
        function openAddMovieModal() {
            editingMovieId = null;
            document.getElementById('modal-title').innerText = 'Tambah Film Baru';
            document.getElementById('edit-movie-id').value = '';
            document.getElementById('movie-title').value = '';
            document.getElementById('movie-year').value = '';
            document.getElementById('movie-genre').value = '';
            document.getElementById('movie-director').value = '';
            document.getElementById('movie-rating').value = '';
            document.getElementById('movie-poster').value = '';
            document.getElementById('movie-description').value = '';
            document.getElementById('movie-modal').style.display = 'flex';
        }
        
        function openEditMovieModal(id) {
            const movie = allMovies.find(m => m.id === id);
            if (movie) {
                editingMovieId = id;
                document.getElementById('modal-title').innerText = 'Edit Film';
                document.getElementById('edit-movie-id').value = movie.id;
                document.getElementById('movie-title').value = movie.title;
                document.getElementById('movie-year').value = movie.year;
                document.getElementById('movie-genre').value = movie.genre;
                document.getElementById('movie-director').value = movie.director;
                document.getElementById('movie-rating').value = movie.rating;
                document.getElementById('movie-poster').value = movie.poster;
                document.getElementById('movie-description').value = movie.description;
                document.getElementById('movie-modal').style.display = 'flex';
            }
        }
        
        function saveMovie() {
            const movieData = {
                id: editingMovieId || Date.now(),
                title: document.getElementById('movie-title').value,
                year: parseInt(document.getElementById('movie-year').value),
                genre: document.getElementById('movie-genre').value,
                director: document.getElementById('movie-director').value,
                rating: parseFloat(document.getElementById('movie-rating').value),
                poster: document.getElementById('movie-poster').value,
                description: document.getElementById('movie-description').value
            };
            
            if (editingMovieId) {
                const index = allMovies.findIndex(m => m.id === editingMovieId);
                if (index !== -1) allMovies[index] = movieData;
            } else {
                allMovies.push(movieData);
            }
            
            saveMoviesToStorage();
            closeModal();
            renderMoviesTable();
            updateStats();
            alert('Film berhasil disimpan!');
        }
        
        function deleteMovie(id) {
            if (confirm('Yakin ingin menghapus film ini?')) {
                allMovies = allMovies.filter(m => m.id !== id);
                saveMoviesToStorage();
                renderMoviesTable();
                updateStats();
                alert('Film berhasil dihapus!');
            }
        }
        
        function deleteUser(id) {
            if (confirm('Yakin ingin menghapus user ini?')) {
                allUsers = allUsers.filter(u => u.id !== id);
                localStorage.setItem(USERS_KEY, JSON.stringify(allUsers));
                renderUsersTable();
                updateStats();
                alert('User berhasil dihapus!');
            }
        }
        
        function deleteReview(id) {
            if (confirm('Yakin ingin menghapus review ini?')) {
                allReviews = allReviews.filter(r => r.id !== id);
                localStorage.setItem(REVIEWS_KEY, JSON.stringify(allReviews));
                renderReviewsTable();
                updateStats();
                alert('Review berhasil dihapus!');
            }
        }
        
        function updateStats() {
            const totalMovies = allMovies.length;
            const totalUsers = allUsers.length;
            const totalReviews = allReviews.length;
            const avgRating = totalMovies > 0 ? (allMovies.reduce((s,m)=>s+m.rating,0)/totalMovies).toFixed(1) : 0;
            
            const statsHtml = `
                <div class="stat-card"><i class="fas fa-film"></i><div class="stat-number">${totalMovies}</div><div class="stat-label">Total Film</div></div>
                <div class="stat-card"><i class="fas fa-users"></i><div class="stat-number">${totalUsers}</div><div class="stat-label">Total User</div></div>
                <div class="stat-card"><i class="fas fa-comments"></i><div class="stat-number">${totalReviews}</div><div class="stat-label">Total Review</div></div>
                <div class="stat-card"><i class="fas fa-star"></i><div class="stat-number">${avgRating}</div><div class="stat-label">Rata-rata Rating</div></div>
            `;
            const statsGrid = document.querySelector('.stats-grid');
            if (statsGrid) statsGrid.innerHTML = statsHtml;
        }
        
        function closeModal() {
            document.getElementById('movie-modal').style.display = 'none';
            editingMovieId = null;
        }
        
        // Global functions
        window.openAddMovieModal = openAddMovieModal;
        window.openEditMovieModal = openEditMovieModal;
        window.saveMovie = saveMovie;
        window.deleteMovie = deleteMovie;
        window.deleteUser = deleteUser;
        window.deleteReview = deleteReview;
        window.closeModal = closeModal;
        window.renderMoviesTable = renderMoviesTable;
        window.renderUsersTable = renderUsersTable;
        window.renderReviewsTable = renderReviewsTable;
        window.updateStats = updateStats;
        
        // Initialize
        initData();
        if (checkAdminAccess()) {
            renderDashboard();
        }
    </script>
</body>
