<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - YZONE</title>
    <link rel="stylesheet" href="/frontend/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .register-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .register-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            transition: all 0.3s;
        }
        
        .register-card:hover {
            border-color: #e50914;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.1);
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .register-header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .register-header p {
            color: #888888;
            font-size: 14px;
        }
        
        .register-icon {
            font-size: 60px;
            color: #e50914;
            margin-bottom: 16px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #cccccc;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 10px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #e50914;
            background: #0a0a0a;
        }
        
        .register-btn {
            width: 100%;
            padding: 14px;
            background: #e50914;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .register-btn:hover {
            background: #b00710;
            transform: translateY(-2px);
        }
        
        .login-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #1a1a1a;
        }
        
        .login-link p {
            color: #888888;
            font-size: 14px;
        }
        
        .login-link a {
            color: #e50914;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid #dc3545;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            color: #dc3545;
            font-size: 14px;
            text-align: center;
        }
        
        .success-message {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid #28a745;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            color: #28a745;
            font-size: 14px;
            text-align: center;
        }
        
        @media (max-width: 480px) {
            .register-card {
                padding: 30px 20px;
            }
            
            .register-header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <div class="register-icon">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>Create Account</h1>
                <p>Daftar untuk menyimpan watchlist-mu</p>
            </div>
            
            <div id="message-container"></div>
            
            <form id="register-form">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Nama Lengkap</label>
                    <input type="text" id="register-name" placeholder="Masukkan nama lengkap" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="register-email" placeholder="Masukkan email" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="register-password" placeholder="Minimal 6 karakter" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-check-circle"></i> Konfirmasi Password</label>
                    <input type="password" id="register-confirm-password" placeholder="Masukkan ulang password" required>
                </div>
                
                <button type="submit" class="register-btn">
                    <i class="fas fa-user-plus"></i> Daftar
                </button>
            </form>
            
            <div class="login-link">
                <p>Sudah punya akun? <a href="/frontend/pages/login.html">Login Sekarang</a></p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <h3>YZONE</h3>
                    <p>Your Zone for Cinema</p>
                </div>
                <div class="footer-links">
                    <a href="/frontend/index.html">Home</a>
                    <a href="/frontend/pages/movies.html">Movies</a>
                    <a href="/frontend/pages/profile.html">Watchlist</a>
                    <a href="/frontend/pages/login.html">Login</a>
                </div>
                <div class="footer-copyright">
                    <p>&copy; 2025 YZONE. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="/frontend/js/utils.js"></script>
    <script src="/frontend/js/auth.js"></script>
    <script src="/frontend/js/navbar.js"></script>
    
    <script>
        const messageContainer = document.getElementById('message-container');
        const registerForm = document.getElementById('register-form');
        
        function showMessage(message, type) {
            messageContainer.innerHTML = `<div class="${type}-message">${message}</div>`;
            setTimeout(() => {
                messageContainer.innerHTML = '';
            }, 3000);
        }
        
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            
            if (password !== confirmPassword) {
                showMessage('Password tidak cocok!', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password minimal 6 karakter!', 'error');
                return;
            }
            
            const result = await window.YZONE_AUTH.register(name, email, password);
            
            if (result.success) {
                showMessage(result.message, 'success');
                setTimeout(() => {
                    window.location.href = '/frontend/pages/login.html';
                }, 1500);
            } else {
                showMessage(result.message, 'error');
            }
        });
    </script>
</body>
</html>
